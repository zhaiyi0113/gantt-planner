<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>可编辑甘特图</title>
  <style>
    :root {
      --row-height: 45px;
      --header-height: 80px;
      --project-row-height: 48px;
      --left-width: 910px;
      --toolbar-space: 82px;
      --day-width: 8.5px;
      --week-width: 59.5px;
      --ink: #17202b;
      --muted: #687482;
      --line: #e2e6eb;
      --header: #ffffff;
      --canvas: #ffffff;
      --select: #edf5ff;
      --green: #61c536;
      --yellow: #ffff4f;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: #fff;
    }

    button, input { font: inherit; }

    .gantt-app {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 960px;
      display: grid;
      grid-template-rows: var(--project-row-height) var(--header-height) minmax(0, 1fr);
      padding-top: var(--toolbar-space);
      background: #fff;
      user-select: none;
    }

    .gantt-header,
    .gantt-content {
      display: grid;
      grid-template-columns: var(--left-width) minmax(0, 1fr);
      min-width: 0;
    }

    .project-row {
      display: grid;
      grid-template-columns: var(--left-width) minmax(0, 1fr);
      min-width: 0;
      background: #fff;
    }

    .project-row-left {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 7px 15px;
      border-top: 1px solid var(--line);
      border-right: 2px solid #e1e5ea;
      border-bottom: 1px solid var(--line);
    }

    .project-row-right {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #fff, #fbfcfd);
    }

    .project-name-label {
      display: inline-flex;
      flex: 1 1 auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      color: #243749;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .project-name-input {
      flex: 1 1 auto;
      min-width: 120px;
      height: 30px;
      padding: 4px 8px;
      border: 1px solid #b8c4cf;
      border-radius: 4px;
      color: #172b3e;
      background: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      user-select: text;
    }

    .project-name-input:focus {
      border-color: #287bc8;
      outline: 2px solid rgba(40,123,200,.2);
      outline-offset: 1px;
    }

    .task-header {
      display: grid;
      grid-template-columns: minmax(260px, 1.7fr) minmax(110px, .78fr) minmax(110px, .78fr) minmax(90px, .55fr) minmax(70px, .4fr);
      height: var(--header-height);
      background: var(--header);
      border-top: 1px solid var(--line);
      border-right: 2px solid #e1e5ea;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .column-header {
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      font-size: 16px;
      font-weight: 700;
      border-left: 1px solid var(--line);
      white-space: nowrap;
    }

    .column-header:first-child { border-left: 0; }

    .header-menu {
      width: 26px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 5px;
      color: #1d2a39;
      background: transparent;
      font-size: 23px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .header-menu:hover, .header-menu:focus-visible {
      background: #edf0f3;
      outline: none;
    }

    .timeline-header-viewport {
      position: relative;
      overflow: hidden;
      height: var(--header-height);
      background: #fff;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .timeline-header-inner {
      position: absolute;
      top: 0;
      left: 0;
      height: var(--header-height);
      will-change: transform;
    }

    .months, .weeks {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .months {
      height: 40px;
      border-bottom: 1px solid var(--line);
    }

    .weeks { height: 40px; }

    .month-cell, .week-cell {
      position: absolute;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
      border-left: 1px solid var(--line);
      color: #162435;
      font-weight: 700;
      background: rgba(255,255,255,.97);
      white-space: nowrap;
    }

    .month-cell {
      padding-left: 15px;
      font-size: 16px;
    }

    .week-cell {
      justify-content: center;
      font-size: 16px;
    }

    .gantt-content {
      min-height: 0;
      overflow: hidden;
    }

    .task-pane {
      min-width: var(--left-width);
      height: 100%;
      padding-bottom: 78px;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: 2px solid #e1e5ea;
      scrollbar-width: none;
      background: #fff;
    }

    .task-pane::-webkit-scrollbar { display: none; }

    .pane-resizer {
      position: absolute;
      top: var(--toolbar-space);
      bottom: 0;
      left: calc(var(--left-width) - 6px);
      z-index: 12;
      width: 12px;
      cursor: col-resize;
      touch-action: none;
    }

    .pane-resizer::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 5px;
      width: 2px;
      background: #d9e0e7;
      content: "";
      transition: background .12s ease, width .12s ease;
    }

    .pane-resizer:hover::before,
    .pane-resizer:focus-visible::before,
    body.is-resizing .pane-resizer::before {
      width: 3px;
      left: 4.5px;
      background: #2b80cd;
    }

    .pane-resizer:focus-visible { outline: none; }
    body.is-resizing { cursor: col-resize; user-select: none; }

    .task-row {
      height: var(--row-height);
      display: grid;
      grid-template-columns: minmax(260px, 1.7fr) minmax(110px, .78fr) minmax(110px, .78fr) minmax(90px, .55fr) minmax(70px, .4fr);
      border-bottom: 1px solid var(--line);
      background: #fff;
      cursor: default;
    }

    .task-row.is-selected .task-cell { background: var(--select); }

    .task-cell {
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-left: 1px solid var(--line);
      font-size: 17px;
      transition: background .12s ease;
    }

    .task-cell:first-child { border-left: 0; }

    .task-cell:not(.name-cell) { white-space: nowrap; }

    .name-cell {
      gap: 8px;
      padding-left: 18px;
      overflow: hidden;
    }

    .name-indent { flex: 0 0 auto; }

    .caret {
      width: 18px;
      height: 24px;
      flex: 0 0 18px;
      display: inline-grid;
      place-items: center;
      margin-left: -2px;
      border: 0;
      color: #172938;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transform: rotate(0deg);
    }

    .caret.is-closed { transform: rotate(-90deg); }

    .caret-placeholder { width: 18px; flex: 0 0 18px; }

    .task-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-name { font-weight: 500; }

    .duration-cell { color: #222b36; }

    .inline-editor {
      width: 100%;
      min-width: 0;
      height: 30px;
      padding: 2px 6px;
      border: 1px solid #2178d4;
      border-radius: 3px;
      outline: none;
      color: var(--ink);
      background: #fff;
      user-select: text;
    }

    .task-cell.can-edit { cursor: text; }
    .task-cell.can-edit:hover { background: #f8fbfd; }
    .task-row.is-selected .task-cell.can-edit:hover { background: #e8f2fd; }

    .table-editor {
      width: 100%;
      min-width: 0;
      height: 100%;
      padding: 0;
      border: 0;
      outline: 0;
      color: inherit;
      background: transparent;
      font: inherit;
      user-select: text;
    }

    .table-editor:focus {
      background: #fff;
      box-shadow: inset 0 0 0 1px #237ed7;
    }

    .name-editor {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-editor {
      cursor: pointer;
      color-scheme: light;
    }

    .timeline-pane {
      position: relative;
      min-width: 0;
      height: 100%;
      overflow: auto;
      background: #fff;
      scrollbar-color: #929292 transparent;
    }

    .timeline-canvas {
      position: relative;
      min-height: 100%;
      background-color: var(--canvas);
    }

    .timeline-row {
      position: relative;
      height: var(--row-height);
      border-bottom: 1px solid var(--line);
      background-image:
        repeating-linear-gradient(to right,
          transparent 0,
          transparent calc(var(--day-width) - 1px),
          rgba(229, 233, 237, .38) calc(var(--day-width) - 1px),
          rgba(229, 233, 237, .38) var(--day-width)),
        repeating-linear-gradient(to right,
          transparent 0,
          transparent calc(var(--week-width) - 1px),
          rgba(213, 218, 224, .75) calc(var(--week-width) - 1px),
          rgba(213, 218, 224, .75) var(--week-width));
    }

    .timeline-row::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to right,
        transparent 0,
        transparent calc(var(--week-width) * 2),
        rgba(245, 247, 249, .62) calc(var(--week-width) * 2),
        rgba(245, 247, 249, .62) calc(var(--week-width) * 3));
      mix-blend-mode: multiply;
    }

    .timeline-row.is-selected {
      background-color: #fbfdff;
    }

    .bar {
      position: absolute;
      top: 10px;
      height: 27px;
      min-width: 8px;
      z-index: 2;
      overflow: hidden;
      border: 1px solid #d1d142;
      border-radius: 5px;
      background: var(--yellow);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .12);
      cursor: grab;
      touch-action: none;
    }

    .bar:hover { filter: brightness(.98); }
    .bar:active { cursor: grabbing; }

    .bar.summary {
      top: 10px;
      height: 28px;
      border-color: #d1d142;
      background: var(--yellow);
    }

    .bar-progress {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      height: 100%;
      background: var(--green);
    }

    .milestone {
      position: absolute;
      top: 15px;
      width: 17px;
      height: 17px;
      z-index: 3;
      background: var(--yellow);
      border: 1px solid #d1d142;
      transform: rotate(45deg);
      cursor: grab;
      touch-action: none;
    }

    .milestone.is-complete {
      background: var(--green);
      border-color: #58af34;
    }

    /* Force every legacy and current task bar to use only progress colors. */
    .bar.green,
    .bar.yellow,
    .bar.purple,
    .bar.blue,
    .bar.summary {
      border-color: #d1d142 !important;
      background: var(--yellow) !important;
    }

    .bar-progress,
    .summary-progress {
      background: var(--green) !important;
    }

    .bar:focus-visible, .milestone:focus-visible {
      outline: 2px solid #1376d1;
      outline-offset: 2px;
    }

    .corner-help {
      position: fixed;
      top: 24px;
      left: 20px;
      z-index: 10;
      display: flex;
      gap: 7px;
      align-items: center;
      max-width: calc(100vw - 40px);
      padding: 8px 11px;
      border: 1px solid #dce2e8;
      border-radius: 6px;
      color: #4e5a67;
      background: rgba(255,255,255,.94);
      box-shadow: 0 2px 12px rgba(18, 28, 42, .08);
      font-size: 12px;
      user-select: none;
    }

    .project-actions {
      position: fixed;
      top: 24px;
      right: 20px;
      z-index: 11;
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: flex-end;
      max-width: calc(100vw - 40px);
      padding: 8px 11px;
      border: 1px solid #dce2e8;
      border-radius: 6px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 2px 12px rgba(18, 28, 42, .08);
      user-select: none;
    }

    .language-picker {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #4e5a67;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .language-picker select {
      min-height: 27px;
      padding: 3px 24px 3px 7px;
      border: 1px solid #cfd7df;
      border-radius: 4px;
      color: #1c354b;
      background: #fff;
      font: inherit;
      cursor: pointer;
    }

    @media (max-width: 1100px) {
      .corner-help { flex-wrap: wrap; }
      .corner-help > span { width: 100%; }
      .gantt-app { --toolbar-space: 112px; }
    }

    @media (max-width: 1180px) {
      .project-actions { top: 78px; flex-wrap: wrap; }
      .gantt-app { --toolbar-space: 128px; }
    }

    @media (max-width: 1100px) {
      .project-actions { top: 98px; }
      .gantt-app { --toolbar-space: 154px; }
    }

    .corner-help kbd {
      padding: 1px 4px;
      border: 1px solid #d7dde3;
      border-radius: 3px;
      background: #f7f8fa;
      color: #273649;
      font-family: inherit;
      font-size: 11px;
    }

    .file-action {
      min-height: 27px;
      padding: 4px 9px;
      border: 1px solid #cfd7df;
      border-radius: 4px;
      color: #1c354b;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .file-action:hover, .file-action:focus-visible {
      border-color: #5d94c9;
      background: #edf5fd;
      outline: none;
    }

    .file-action.primary {
      border-color: #287bc8;
      color: #fff;
      background: #287bc8;
    }

    .file-action.primary:hover, .file-action.primary:focus-visible {
      border-color: #1765ad;
      background: #1765ad;
    }

    .file-action.danger {
      border-color: #dea7a4;
      color: #b3261e;
    }

    .file-action.danger:hover, .file-action.danger:focus-visible {
      border-color: #b3261e;
      background: #fff1f0;
    }

    .file-action:disabled {
      border-color: #dce1e6;
      color: #98a1ab;
      background: #f6f7f8;
      cursor: not-allowed;
    }

    .action-menu {
      position: fixed;
      z-index: 20;
      width: 220px;
      padding: 6px;
      border: 1px solid #d8dde4;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(20, 34, 48, .17);
    }

    .action-menu[hidden] { display: none; }

    .menu-title {
      padding: 7px 9px 5px;
      color: #7a8590;
      font-size: 12px;
    }

    .menu-item {
      width: 100%;
      min-height: 33px;
      padding: 6px 9px;
      border: 0;
      border-radius: 4px;
      color: #1b2a3a;
      background: transparent;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
    }

    .menu-item:hover, .menu-item:focus-visible {
      background: #edf5fd;
      outline: none;
    }

    .menu-item.danger { color: #b3261e; }
    .menu-separator { height: 1px; margin: 5px 2px; background: #e8ebee; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 19px;
      z-index: 30;
      max-width: min(520px, calc(100vw - 42px));
      padding: 9px 13px;
      border-radius: 6px;
      color: #fff;
      background: #263440;
      box-shadow: 0 3px 15px rgba(0,0,0,.18);
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 15px);
      transition: opacity .18s, transform .18s;
    }

    .toast.is-visible { opacity: 1; transform: translate(-50%, 0); }

    .today-indicator {
      position: fixed;
      right: 20px;
      bottom: 18px;
      z-index: 31;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 11px;
      border: 1px solid #d8dfe6;
      border-radius: 6px;
      color: #334454;
      background: rgba(255,255,255,.96);
      box-shadow: 0 3px 14px rgba(18, 28, 42, .12);
      font-size: 12px;
      font-weight: 600;
      user-select: none;
    }

    .progress-legend-item {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      white-space: nowrap;
    }

    .progress-swatch {
      width: 11px;
      height: 11px;
      border: 1px solid rgba(36, 46, 54, .22);
      border-radius: 3px;
    }

    .progress-swatch.done { background: var(--green); border-color: #58af34; }
    .progress-swatch.remaining { background: var(--yellow); border-color: #d1d142; }
    .today-date { padding-left: 2px; color: #162b3f; white-space: nowrap; }

    .hidden-input { display: none; }

    .final-date-panel {
      position: fixed;
      left: 0;
      bottom: 0;
      z-index: 32;
      display: flex;
      gap: 14px;
      align-items: center;
      width: var(--left-width);
      min-height: 70px;
      padding: 10px 16px;
      border-top: 1px solid #d8dfe6;
      border-right: 2px solid #d8dfe6;
      background: rgba(255,255,255,.97);
      box-shadow: 0 -3px 12px rgba(18, 28, 42, .08);
      color: #233444;
    }

    .final-date-label {
      display: flex;
      flex: 0 0 auto;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .final-date-input {
      width: 142px;
      height: 29px;
      padding: 4px 8px;
      border: 1px solid #aebbc8;
      border-radius: 4px;
      color: #182b3c;
      background: #fff;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .final-date-input:focus-visible {
      border-color: #287bc8;
      outline: 2px solid rgba(40,123,200,.24);
      outline-offset: 1px;
    }

    .final-counts {
      display: flex;
      gap: 6px;
      align-items: baseline;
      padding-left: 2px;
      font-size: 13px;
      white-space: nowrap;
    }

    .final-counts strong { color: #176d35; font-size: 18px; }
    .final-counts .count-separator { color: #99a5b0; padding: 0 2px; }

    .date-picker {
      position: fixed;
      z-index: 50;
      width: 278px;
      padding: 8px;
      border: 1px solid #cdd6df;
      border-radius: 7px;
      background: #fff;
      box-shadow: 0 9px 26px rgba(18, 28, 42, .2);
      color: #1b2b3a;
    }

    .date-picker[hidden] { display: none; }
    .date-picker-header { display: flex; align-items: center; justify-content: space-between; gap: 5px; padding: 1px 1px 7px; }
    .date-picker-title { min-width: 0; color: #253647; font-size: 13px; text-align: center; }
    .date-picker-nav {
      width: 29px;
      height: 27px;
      border: 0;
      border-radius: 4px;
      color: #1d3850;
      background: transparent;
      font-size: 21px;
      line-height: 1;
      cursor: pointer;
    }
    .date-picker-nav:hover, .date-picker-nav:focus-visible { background: #edf5fd; outline: none; }
    .date-picker-weekdays, .date-picker-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .date-picker-weekday { padding: 3px 0 4px; color: #718090; font-size: 11px; font-weight: 700; text-align: center; }
    .date-picker-day {
      height: 31px;
      border: 0;
      border-radius: 4px;
      color: #1b2b3a;
      background: transparent;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .date-picker-day:hover, .date-picker-day:focus-visible { background: #e8f3ff; outline: none; }
    .date-picker-day.is-outside { color: #a6b0ba; }
    .date-picker-day.is-today { box-shadow: inset 0 0 0 1px #5a9bd5; }
    .date-picker-day.is-selected { color: #fff; background: #287bc8; }

    @media (max-width: 1180px) {
      .final-date-panel { flex-wrap: wrap; gap: 8px 13px; min-height: 78px; }
    }

    @media (max-width: 1200px) {
      :root { --left-width: 750px; }
      .task-header, .task-row { grid-template-columns: minmax(300px, 1fr) 125px 125px 110px 90px; }
      .task-cell { font-size: 15px; padding-left: 11px; padding-right: 11px; }
      .column-header { font-size: 15px; padding-left: 11px; }
    }
  </style>
</head>
<body>
  <main class="gantt-app" aria-label="可编辑甘特图">
    <section class="project-row" aria-label="项目名称">
      <div class="project-row-left">
        <label class="project-name-label" for="projectName"><span id="projectLabel">Project：</span>
          <input class="project-name-input" id="projectName" type="text" placeholder="填写项目名称" autocomplete="off">
        </label>
        <button class="file-action" id="newGanttButton" type="button">新建甘特图</button>
      </div>
      <div class="project-row-right" aria-hidden="true"></div>
    </section>
    <section class="gantt-header" aria-label="甘特图表头">
      <div class="task-header">
        <div class="column-header"><span>Task Name</span><button class="header-menu" id="mainMenuButton" aria-label="打开编辑菜单">⋮</button></div>

      var tasks = loadTasks();

      function parseDate(value) {
        var parts = String(value).split("-").map(Number);
        return new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
      }

      function formatDate(date) {
        return date.toISOString().slice(0, 10);
      }

      function todayUtcDate() {
        var now = new Date();
        return new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      }

      function updateTodayIndicator() {
        document.getElementById("todayIndicator").setAttribute("aria-label", tr("progressLegend"));
        document.getElementById("completedLabel").textContent = tr("completed");
        document.getElementById("remainingLabel").textContent = tr("remaining");
        document.getElementById("todayDate").textContent = tr("today") +
          (currentLanguage === "en" ? ": " : "：") + formatDate(todayUtcDate());
      }

      function taskProgressPercent(range) {
        var start = parseDate(range.start);
        var end = parseDate(range.end);
        var today = todayUtcDate();
        if (today < start) { return 0; }
        if (today >= end) { return 100; }
        var totalDays = dayDifference(start, end) + 1;
        var completedDays = dayDifference(start, today) + 1;
        return Math.round((completedDays / totalDays) * 1000) / 10;
      }

      function progressDescription(task, range) {
        var percent = taskProgressPercent(range);
        var today = formatDate(todayUtcDate());
        if (currentLanguage === "en") {
          return task.name + ": " + percent + "% complete as of " + today;
        }
        return task.name + "：截至 " + today + " 已完成 " + percent + "%";
      }

      function refreshProgressForNewDay() {
        var today = formatDate(todayUtcDate());
        if (today !== lastProgressDate) {
          lastProgressDate = today;
          updateTodayIndicator();
          updateFinalPresentationPanel();
          render();
        }
      }

      function addDays(date, amount) {
        var result = new Date(date.getTime());
        result.setUTCDate(result.getUTCDate() + amount);
        return result;
      }

      function dayDifference(first, second) {
        return Math.round((second.getTime() - first.getTime()) / DAY);
      }

      function isWorkday(date) {
        var weekday = date.getUTCDay();
        return weekday !== 0 && weekday !== 6;
      }

      function workdayCount(start, end) {
        var cursor = parseDate(start);
        var finalDate = parseDate(end);
        var amount = 0;
        while (cursor <= finalDate) {
          if (isWorkday(cursor)) { amount += 1; }
          cursor = addDays(cursor, 1);
        }
        return amount;
      }

      function durationText(task, range) {
        if (task.type === "milestone") { return "0 " + tr("days"); }
        return workdayCount(range.start, range.end) + " " + tr("days");
      }

      function workWeekCount(task, range) {
        if (task.type === "milestone") { return 0; }
        return Math.ceil(workdayCount(range.start, range.end) / 5);
      }

      function weekText(task, range) {
        var amount = workWeekCount(task, range);
        var unit = currentLanguage === "en" && amount !== 1 ? "weeks" : tr("weekUnit");
        return amount + " " + unit;
      }

      function copyDefaults() {
        return JSON.parse(JSON.stringify(defaults));
      }

      function loadLanguage() {
        try {
          return localStorage.getItem(LANGUAGE_KEY) === "en" ? "en" : "zh-CN";
        } catch (error) {
          return "zh-CN";
        }
      }

      function loadProjectName() {
        try { return localStorage.getItem(PROJECT_NAME_KEY) || ""; }
        catch (error) { return ""; }
      }

      function setProjectName(nextName) {
        projectName = String(nextName || "").trim();
        projectNameInput.value = projectName;
        try { localStorage.setItem(PROJECT_NAME_KEY, projectName); } catch (error) { /* Storage is optional. */ }
      }

      function updateProjectRow() {
        document.querySelector(".project-row").setAttribute("aria-label", tr("project"));
        document.getElementById("projectLabel").textContent = tr("project");
        projectNameInput.placeholder = tr("projectNamePlaceholder");
        projectNameInput.value = projectName;
        document.getElementById("newGanttButton").textContent = tr("newGantt");
      }

      function loadTableWidth() {
        try {
          var storedWidth = Number(localStorage.getItem(TABLE_WIDTH_KEY));
          if (Number.isFinite(storedWidth) && storedWidth >= MIN_TABLE_WIDTH) { return storedWidth; }
        } catch (error) {
          // Storage is optional; the default width still works.
        }
        return 910;
      }

      function isValidDateValue(value) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value))) { return false; }
        return formatDate(parseDate(value)) === value;
      }

      function latestProjectDate() {
        if (!tasks.length) { return formatDate(todayUtcDate()); }
        return tasks.map(function (task) { return displayRange(task).end; }).sort().slice(-1)[0];
      }

      function loadFinalPresentationDate() {
        try {
          var storedDate = localStorage.getItem(FINAL_DATE_KEY);
          if (isValidDateValue(storedDate)) { return storedDate; }
        } catch (error) {
          // Storage is optional; use the latest project date instead.
        }
        return latestProjectDate();
      }

      function saveFinalPresentationDate() {
        try { localStorage.setItem(FINAL_DATE_KEY, finalPresentationDate); } catch (error) { /* Storage is optional. */ }
      }

      function finalDateUnit(amount, singular, plural) {
        if (currentLanguage !== "en") { return singular === "day" ? tr("days") : tr("weekUnit"); }
        return amount === 1 ? singular : plural;
      }

      function updateFinalPresentationPanel() {
        var remainingDays = Math.max(0, dayDifference(todayUtcDate(), parseDate(finalPresentationDate)));
        var remainingWeeks = Math.ceil(remainingDays / 5);
        document.getElementById("finalDatePanel").setAttribute("aria-label", tr("finalPresentation"));
        document.getElementById("finalPresentationLabel").textContent = tr("finalPresentation");
        finalPresentationInput.value = finalPresentationDate;
        finalPresentationInput.title = tr("chooseDate");
        document.getElementById("finalRemainingLabel").textContent = tr("remaining");
        document.getElementById("finalRemainingDays").textContent = String(remainingDays);
        document.getElementById("finalDaysUnit").textContent = finalDateUnit(remainingDays, "day", "days");
        document.getElementById("finalRemainingWeeks").textContent = String(remainingWeeks);
        document.getElementById("finalWeeksUnit").textContent = finalDateUnit(remainingWeeks, "week", "weeks");
      }

      function setFinalPresentationDate(nextDate) {
        if (!isValidDateValue(nextDate)) { return; }
        finalPresentationDate = nextDate;
        saveFinalPresentationDate();
        updateFinalPresentationPanel();
      }

      function datePickerWeekdayLabels() {
        return currentLanguage === "en" ?
          ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"] :
          ["一", "二", "三", "四", "五", "六", "日"];
      }

      function hideDatePicker() {
        datePicker.hidden = true;
        datePickerState = null;
      }

      function positionDatePicker(anchor) {
        var box = anchor.getBoundingClientRect();
        var left = Math.max(8, Math.min(window.innerWidth - datePicker.offsetWidth - 8, box.left));
        var top = box.bottom + 6;
        if (top + datePicker.offsetHeight > window.innerHeight - 8) {
          top = Math.max(8, box.top - datePicker.offsetHeight - 6);
        }
        datePicker.style.left = left + "px";
        datePicker.style.top = top + "px";
      }

      function renderDatePicker() {
        if (!datePickerState) { return; }
        var view = datePickerState.view;
        var selectedDate = datePickerState.selected;
        var formatter = new Intl.DateTimeFormat(currentLanguage === "en" ? "en-US" : "zh-CN", {
          year: "numeric", month: "long", timeZone: "UTC"
        });
        datePickerTitle.textContent = formatter.format(view);
        datePicker.setAttribute("aria-label", tr("chooseDate"));
        document.getElementById("datePickerPrevious").setAttribute("aria-label", tr("previousMonth"));
        document.getElementById("datePickerNext").setAttribute("aria-label", tr("nextMonth"));
        datePickerWeekdays.replaceChildren();
        datePickerWeekdayLabels().forEach(function (label) {
          var weekday = document.createElement("span");
          weekday.className = "date-picker-weekday";
          weekday.textContent = label;
          datePickerWeekdays.appendChild(weekday);
        });
        datePickerDays.replaceChildren();
        var firstDay = new Date(Date.UTC(view.getUTCFullYear(), view.getUTCMonth(), 1));
        var offset = (firstDay.getUTCDay() + 6) % 7;
        var gridStart = addDays(firstDay, -offset);
        var today = formatDate(todayUtcDate());
        for (var index = 0; index < 42; index += 1) {
          (function (date) {
            var dateValue = formatDate(date);
            var dayButton = document.createElement("button");
            dayButton.type = "button";
            dayButton.className = "date-picker-day" +
              (date.getUTCMonth() !== view.getUTCMonth() ? " is-outside" : "") +
              (dateValue === today ? " is-today" : "") +
              (dateValue === selectedDate ? " is-selected" : "");
            dayButton.textContent = String(date.getUTCDate());
            dayButton.setAttribute("aria-label", dateValue);
            dayButton.addEventListener("click", function (event) {
              event.stopPropagation();
              var selectDate = dateValue;
              var callback = datePickerState && datePickerState.onSelect;
              hideDatePicker();
              if (callback) { callback(selectDate); }
            });
            datePickerDays.appendChild(dayButton);
          }(addDays(gridStart, index)));
        }
        positionDatePicker(datePickerState.anchor);
      }

      function openDatePicker(anchor, selectedDate, onSelect) {
        var selected = isValidDateValue(selectedDate) ? selectedDate : formatDate(todayUtcDate());
        var selectedObject = parseDate(selected);
        datePickerState = {
          anchor: anchor,
          selected: selected,
          view: new Date(Date.UTC(selectedObject.getUTCFullYear(), selectedObject.getUTCMonth(), 1)),
          onSelect: onSelect
        };
        datePicker.hidden = false;
        renderDatePicker();
      }

      function changeDatePickerMonth(amount) {
        if (!datePickerState) { return; }
        var view = datePickerState.view;
        datePickerState.view = new Date(Date.UTC(view.getUTCFullYear(), view.getUTCMonth() + amount, 1));
        renderDatePicker();
      }

      function maximumTableWidth() {
        return Math.max(MIN_TABLE_WIDTH, window.innerWidth - MIN_TIMELINE_WIDTH);
      }

      function setTableWidth(nextWidth, persist) {
        tableWidth = Math.round(Math.max(MIN_TABLE_WIDTH, Math.min(maximumTableWidth(), nextWidth)));
        document.documentElement.style.setProperty("--left-width", tableWidth + "px");
        paneResizer.setAttribute("aria-valuemin", String(MIN_TABLE_WIDTH));
        paneResizer.setAttribute("aria-valuemax", String(maximumTableWidth()));
        paneResizer.setAttribute("aria-valuenow", String(tableWidth));
        if (persist) {
          try { localStorage.setItem(TABLE_WIDTH_KEY, String(tableWidth)); } catch (error) { /* Storage is optional. */ }
        }
      }

      function startTableResize(event) {
        event.preventDefault();
        event.stopPropagation();
        resizeState = { startX: event.clientX, startWidth: tableWidth };
        paneResizer.setPointerCapture(event.pointerId);
        document.body.classList.add("is-resizing");
      }

      function moveTableResize(event) {
        if (!resizeState) { return; }
        setTableWidth(resizeState.startWidth + event.clientX - resizeState.startX, false);
      }

      function endTableResize() {
        if (!resizeState) { return; }
        resizeState = null;
        document.body.classList.remove("is-resizing");
        setTableWidth(tableWidth, true);
      }

      function tr(key) {
        return (translations[currentLanguage] && translations[currentLanguage][key]) ||
          translations["zh-CN"][key] || key;
      }

      function applyTranslations() {
        var headers = document.querySelectorAll(".column-header span");
        var values = [tr("taskName"), tr("start"), tr("end"), tr("duration"), tr("weeks")];

        timelinePane.setAttribute("aria-label", tr("timeline"));

        document.querySelector('[data-quick="zoomIn"]').setAttribute("aria-label", tr("zoomIn"));
        document.querySelector(".corner-help").setAttribute("aria-label", tr("manageTasks"));
        document.querySelector(".corner-help > span").textContent = tr("help");
        document.getElementById("moveUpButton").textContent = tr("moveUp");
        document.getElementById("moveDownButton").textContent = tr("moveDown");
        document.getElementById("addTaskButton").textContent = tr("addTask");
        document.getElementById("outdentTaskButton").textContent = tr("outdent");
        document.getElementById("deleteTaskButton").textContent = tr("deleteTask");
        document.querySelector(".project-actions").setAttribute("aria-label", tr("projectActions"));

        document.getElementById("undoButton").textContent = tr("undo");
        document.getElementById("redoButton").textContent = tr("redo");
        document.getElementById("saveButton").textContent = tr("save");
        document.getElementById("saveProjectButton").textContent = tr("saveFile");
        document.getElementById("loadProjectButton").textContent = tr("loadFile");
        document.getElementById("languageLabel").textContent = tr("language");
        languageSelect.setAttribute("aria-label", tr("language"));
        languageSelect.value = currentLanguage;

        updateFinalPresentationPanel();
      }

      function setLanguage(language) {
        currentLanguage = language === "en" ? "en" : "zh-CN";
        try { localStorage.setItem(LANGUAGE_KEY, currentLanguage); } catch (error) { /* Storage is optional. */ }
        applyTranslations();
        render();
        showToast(tr("languageChanged"));
      }

      function loadTasks() {
        try {
          var stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            var parsed = JSON.parse(stored);
            if (Array.isArray(parsed)) { return parsed; }
          }
        } catch (error) {
          console.warn("无法读取已保存的数据", error);
        }
        return copyDefaults();
      }

      function persistTasks() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        } catch (error) {
          showToast(currentLanguage === "en" ?
            "Your browser could not save the project; use Save project file (JSON) as a backup." :
            "浏览器未能保存数据；仍可使用“保存项目文件（JSON）”备份。"
          );
        }
      }

      function saveTasks() {
        var nextSnapshot = JSON.stringify(tasks);
        if (nextSnapshot !== lastSavedSnapshot) {
          undoStack.push(lastSavedSnapshot);
          if (undoStack.length > MAX_HISTORY_STEPS) { undoStack.shift(); }
          redoStack = [];
          lastSavedSnapshot = nextSnapshot;
        }
        persistTasks();
        updateHistoryButtons();
      }

      function updateHistoryButtons() {
        document.getElementById("undoButton").disabled = !undoStack.length;
        document.getElementById("redoButton").disabled = !redoStack.length;
      }

      function restoreHistory(snapshot) {
        var restored = JSON.parse(snapshot);
        if (!validateImport(restored)) { throw new Error("Invalid history data"); }
        tasks = restored;
        selectedId = null;
        collapsedIds.clear();
        lastSavedSnapshot = snapshot;
        persistTasks();
      }

      function undoChanges() {
        if (!undoStack.length) {
          showToast(tr("nothingToUndo"));
          return;
        }
        var currentSnapshot = JSON.stringify(tasks);
        var previousSnapshot = undoStack.pop();
        redoStack.push(currentSnapshot);
        restoreHistory(previousSnapshot);
        render();
        updateHistoryButtons();
        showToast(tr("undone"));
      }

      function redoChanges() {
        if (!redoStack.length) {
          showToast(tr("nothingToRedo"));
          return;
        }
        var currentSnapshot = JSON.stringify(tasks);
        var nextSnapshot = redoStack.pop();
        undoStack.push(currentSnapshot);
        restoreHistory(nextSnapshot);
        render();
        updateHistoryButtons();
        showToast(tr("redone"));
      }

      function findTask(id) {
        return tasks.find(function (task) { return task.id === id; });
      }

      function childrenOf(id) {
        return tasks.filter(function (task) { return task.parent === id; });
      }

      function hasChildren(task) {
        return childrenOf(task.id).length > 0;
      }

      function summaryRange(task) {
        var descendants = descendantsOf(task.id);
        if (!descendants.length) {
          return { start: task.start, end: task.end };
        }
        var ranges = descendants.map(function (item) { return displayRange(item); });
        var start = ranges.map(function (range) { return range.start; }).sort()[0];
        var end = ranges.map(function (range) { return range.end; }).sort().slice(-1)[0];
        return { start: start, end: end };
      }

      function descendantsOf(id) {
        var result = [];
        childrenOf(id).forEach(function (child) {
          result.push(child);
          result = result.concat(descendantsOf(child.id));
        });
        return result;
      }

      function displayRange(task) {
        return task.type === "summary" && !task.manualRange ?
          summaryRange(task) :
          { start: task.start, end: task.end };
      }

      function visibleRows() {
        var result = [];
        function visit(parent, depth) {
          childrenOf(parent).forEach(function (task) {
            result.push({ task: task, depth: depth });
            if (!collapsedIds.has(task.id)) {
              visit(task.id, depth + 1);
            }
          });
        }
        visit(null, 0);
        return result;
      }

      function totalTimelineDays() {
        return dayDifference(timelineStart, timelineEnd) + 1;
      }

      function refreshTimelineRange() {
        if (!tasks.length) { return; }
        var ranges = tasks.map(function (task) { return displayRange(task); });
        var earliest = ranges.map(function (range) { return range.start; }).sort()[0];
        var latest = ranges.map(function (range) { return range.end; }).sort().slice(-1)[0];
        timelineStart = addDays(parseDate(earliest), -7);
        timelineEnd = addDays(parseDate(latest), 9);
      }

      function setTimelineStyle() {
        var width = totalTimelineDays() * DAY_WIDTH;
        document.documentElement.style.setProperty("--day-width", DAY_WIDTH + "px");
        document.documentElement.style.setProperty("--week-width", (DAY_WIDTH * 7) + "px");
        timelineCanvas.style.width = width + "px";
        timelineHeaderInner.style.width = width + "px";
      }

      function renderHeader() {
        setTimelineStyle();
        var monthHolder = document.getElementById("months");
        var weekHolder = document.getElementById("weeks");
        monthHolder.innerHTML = "";
        weekHolder.innerHTML = "";
        var cursor = new Date(Date.UTC(timelineStart.getUTCFullYear(), timelineStart.getUTCMonth(), 1));
        while (cursor <= timelineEnd) {
          var monthStart = cursor < timelineStart ? timelineStart : cursor;
          var nextMonth = new Date(Date.UTC(cursor.getUTCFullYear(), cursor.getUTCMonth() + 1, 1));
          var monthEnd = addDays(nextMonth, -1);
          if (monthEnd > timelineEnd) { monthEnd = timelineEnd; }
          var cell = document.createElement("div");
          cell.className = "month-cell";
          cell.textContent = cursor.getUTCFullYear() + "-" + String(cursor.getUTCMonth() + 1).padStart(2, "0");
          cell.style.left = (dayDifference(timelineStart, monthStart) * DAY_WIDTH) + "px";
          cell.style.width = ((dayDifference(monthStart, monthEnd) + 1) * DAY_WIDTH) + "px";
          monthHolder.appendChild(cell);
          cursor = nextMonth;
        }

        var tick = timelineStart;
        var firstTick = true;
        while (tick <= timelineEnd) {
          var nextTick;
          if (firstTick) {
            var daysUntilSunday = (7 - tick.getUTCDay()) % 7;
            nextTick = daysUntilSunday === 0 ? addDays(tick, 7) : addDays(tick, daysUntilSunday);
            firstTick = false;
          } else {
            nextTick = addDays(tick, 7);
          }
          var tickEnd = addDays(nextTick, -1);
          if (tickEnd > timelineEnd) { tickEnd = timelineEnd; }
          var weekCell = document.createElement("div");
          weekCell.className = "week-cell";
          weekCell.textContent = String(tick.getUTCDate()).padStart(2, "0");
          weekCell.style.left = (dayDifference(timelineStart, tick) * DAY_WIDTH) + "px";
          weekCell.style.width = ((dayDifference(tick, tickEnd) + 1) * DAY_WIDTH) + "px";
          weekHolder.appendChild(weekCell);
          tick = nextTick;
        }
      }

      function createTaskRow(entry) {
        var task = entry.task;
        var range = displayRange(task);
        var isSummary = task.type === "summary";
        var hasChildTasks = hasChildren(task);
        var row = document.createElement("div");
        row.className = "task-row" + (task.id === selectedId ? " is-selected" : "");
        row.dataset.taskId = task.id;

        var nameCell = document.createElement("div");
        nameCell.className = "task-cell name-cell can-edit";
        nameCell.style.paddingLeft = (18 + entry.depth * 25) + "px";
        if (hasChildTasks) {
          var caret = document.createElement("button");
          caret.className = "caret" + (collapsedIds.has(task.id) ? " is-closed" : "");
          caret.type = "button";
          caret.textContent = "▾";
          caret.title = collapsedIds.has(task.id) ? "展开子任务" : "折叠子任务";
          caret.title = collapsedIds.has(task.id) ? tr("expandChildren") : tr("collapseChildren");
          caret.addEventListener("click", function (event) {
            event.stopPropagation();
            if (collapsedIds.has(task.id)) { collapsedIds.delete(task.id); }
            else { collapsedIds.add(task.id); }
            render();
          });
          nameCell.appendChild(caret);
        } else {
          var spacer = document.createElement("span");
          spacer.className = "caret-placeholder";
          nameCell.appendChild(spacer);
        }
        var name = makeTextEditor(task);
        name.className += isSummary ? " summary-name" : "";
        nameCell.appendChild(name);
        nameCell.addEventListener("click", function (event) {
          event.stopPropagation();
          selectTask(task.id);
        });

        var startCell = makeDateCell(task, "start", range.start);
        var endCell = makeDateCell(task, "end", range.end);
        var durationCell = document.createElement("div");
        durationCell.className = "task-cell duration-cell";
        durationCell.textContent = durationText(task, range);
        durationCell.title = "根据开始和结束日期自动计算（含起止日，不含周末）";
        durationCell.title = tr("durationHint");
        var weeksCell = document.createElement("div");
        weeksCell.className = "task-cell duration-cell weeks-cell";
        weeksCell.textContent = weekText(task, range);
        weeksCell.title = "每 5 个工作日计算为 1 周";
        weeksCell.title = tr("weeksHint");
        row.appendChild(nameCell);
        row.appendChild(startCell);
        row.appendChild(endCell);
        row.appendChild(durationCell);
        row.appendChild(weeksCell);
        row.addEventListener("click", function () {
          selectTask(task.id);
        });
        return row;
      }

      function makeDateCell(task, field, value) {
        var cell = document.createElement("div");
        cell.className = "task-cell can-edit";
        cell.dataset.field = field;
        var input = document.createElement("input");
        input.className = "table-editor date-editor";
        input.type = "text";
        input.readOnly = true;
        input.value = value;
        input.setAttribute("aria-haspopup", "dialog");
        input.title = task.type === "summary" ?
          "编辑汇总日期（之后不再随子任务自动变化）" :
          "编辑日期";
        input.title = task.type === "summary" ? tr("editSummaryDate") : tr("editDate");
        input.addEventListener("click", function (event) {
          event.stopPropagation();
          selectTask(task.id);
          openDatePicker(input, input.value, function (nextDate) {
            updateTaskField(task, field, nextDate);
          });
        });
        input.addEventListener("focus", function (event) {
          event.stopPropagation();
          selectTask(task.id);
        });
        input.addEventListener("keydown", function (event) {
          if (event.key !== "Enter" && event.key !== " ") { return; }
          event.preventDefault();
          openDatePicker(input, input.value, function (nextDate) {
            updateTaskField(task, field, nextDate);
          });
        });
        cell.appendChild(input);
        cell.addEventListener("click", function (event) {
          event.stopPropagation();
          selectTask(task.id);
        });
        return cell;
      }

      function createTimelineRow(entry) {
        var task = entry.task;
        var range = displayRange(task);
        var row = document.createElement("div");
        row.className = "timeline-row" + (task.id === selectedId ? " is-selected" : "");
        row.dataset.taskId = task.id;
        if (task.type === "milestone") {
          var milestone = document.createElement("div");
          var milestoneComplete = taskProgressPercent(range) >= 100;
          milestone.className = "milestone" + (milestoneComplete ? " is-complete" : "");
          milestone.dataset.taskId = task.id;
          milestone.tabIndex = 0;
          milestone.setAttribute("aria-label", progressDescription(task, range));
          milestone.title = progressDescription(task, range);
          milestone.style.left = (dayDifference(timelineStart, parseDate(range.start)) * DAY_WIDTH) + "px";
          row.appendChild(milestone);
        } else {
          var bar = document.createElement("div");
          var progressPercent = taskProgressPercent(range);
          bar.className = "bar" + (task.type === "summary" ? " summary" : "");
          bar.dataset.taskId = task.id;
          bar.tabIndex = 0;
          bar.title = progressDescription(task, range);
          bar.setAttribute("aria-label", progressDescription(task, range));
          var left = dayDifference(timelineStart, parseDate(range.start)) * DAY_WIDTH;
          var width = (dayDifference(parseDate(range.start), parseDate(range.end)) + 1) * DAY_WIDTH;
          bar.style.left = left + "px";
          bar.style.width = Math.max(width, 8) + "px";
          var progress = document.createElement("div");
          progress.className = "bar-progress";
          progress.style.width = progressPercent + "%";
          bar.appendChild(progress);
          row.appendChild(bar);
        }
        row.addEventListener("click", function () {
          selectTask(task.id);
        });
        return row;
      }

      function render() {
        refreshTimelineRange();
        renderHeader();
        var rows = visibleRows();
        taskRowsElement.innerHTML = "";
        timelineCanvas.innerHTML = "";
        rows.forEach(function (entry) {
          taskRowsElement.appendChild(createTaskRow(entry));
          timelineCanvas.appendChild(createTimelineRow(entry));
        });
        timelineCanvas.style.minHeight = Math.max(timelinePane.clientHeight, rows.length * 45) + "px";
        updateTaskActionButtons();
      }

      function updateTaskActionButtons() {
        var selected = findTask(selectedId);
        document.getElementById("moveUpButton").disabled = !selected || !visibleMoveTarget(selected, "up");
        document.getElementById("moveDownButton").disabled = !selected || !visibleMoveTarget(selected, "down");
        document.getElementById("outdentTaskButton").disabled = !selected || !selected.parent;
        document.getElementById("deleteTaskButton").disabled = !selected;
      }

      function selectTask(taskId) {
        if (!findTask(taskId)) { return; }
        selectedId = taskId;
        taskRowsElement.querySelectorAll(".task-row").forEach(function (row) {
          row.classList.toggle("is-selected", row.dataset.taskId === taskId);
        });
        timelineCanvas.querySelectorAll(".timeline-row").forEach(function (row) {
          row.classList.toggle("is-selected", row.dataset.taskId === taskId);
        });
        updateTaskActionButtons();
      }

      function visibleMoveTarget(task, direction) {
        var rows = visibleRows();
        var position = rows.findIndex(function (entry) { return entry.task.id === task.id; });
        if (position < 0) { return null; }
        if (direction === "up") {
          return position > 0 ? rows[position - 1].task : null;
        }
        var ownIds = new Set([task.id].concat(descendantsOf(task.id).map(function (item) { return item.id; })));
        for (var index = position + 1; index < rows.length; index += 1) {
          if (!ownIds.has(rows[index].task.id)) { return rows[index].task; }
        }
        return null;
      }

      function makeTextEditor(task) {
        var input = document.createElement("input");
        input.className = "table-editor name-editor";
        input.type = "text";
        input.value = task.name;
        input.title = "编辑任务名称";
        input.title = tr("editTaskName");
        input.addEventListener("click", function (event) {
          event.stopPropagation();
          selectTask(task.id);
        });
        input.addEventListener("focus", function (event) {
          event.stopPropagation();
          selectTask(task.id);
        });
        input.addEventListener("change", function () {
          updateTaskField(task, "name", input.value);
        });
        input.addEventListener("keydown", function (event) {
          if (event.key === "Enter") { input.blur(); }
          if (event.key === "Escape") {
            input.value = task.name;
            input.blur();
          }
        });
        return input;
      }

      function updateTaskField(task, field, nextValue) {
        var value = String(nextValue || "").trim();
        if (!value) {
          render();
          return;
        }
        if (field === "name") {
          task.name = value;
        } else {
          task[field] = value;
          if (task.type === "summary") { task.manualRange = true; }
          if (parseDate(task.end) < parseDate(task.start)) {
            if (field === "start") { task.end = value; }
            else { task.start = value; }
          }
        }
        saveTasks();
        render();
      }

      function requestEditor(task, field) {
        selectedId = task.id;
        requestAnimationFrame(function () {
          var row = taskRowsElement.querySelector('[data-task-id="' + task.id + '"]');
          var cell = row ? row.querySelector('.task-cell[data-field="' + field + '"]') : null;
          var value = field === "name" ? task.name : displayRange(task)[field];
          if (cell) { openEditor(cell, task, field, value); }
        });
      }

      function openEditor(cell, task, field, currentValue) {
        if (cell.querySelector("input")) { return; }
        selectedId = task.id;
        var input = document.createElement("input");
        input.className = "inline-editor";
        input.type = field === "name" ? "text" : "date";
        input.value = currentValue;
        input.setAttribute("aria-label", field === "name" ? "任务名称" : (field === "start" ? "开始日期" : "结束日期"));
        cell.replaceChildren(input);
        input.focus();
        if (field === "name") { input.select(); }
        var committed = false;
        function commit() {
          if (committed) { return; }
          committed = true;
          var nextValue = input.value.trim();
          if (nextValue) {
            if (field === "name") {
              task.name = nextValue;
            } else {
              task[field] = nextValue;
              if (task.type === "summary") { task.manualRange = true; }
              if (parseDate(task.end) < parseDate(task.start)) {
                if (field === "start") { task.end = nextValue; }
                else { task.start = nextValue; }
              }
            }
            saveTasks();
          }
          render();
        }
        input.addEventListener("blur", commit);
        input.addEventListener("keydown", function (event) {
          if (event.key === "Enter") { input.blur(); }
          if (event.key === "Escape") {
            committed = true;
            render();
          }
        });
      }

      function dateWithinTimeline(date) {
        return date >= timelineStart && date <= timelineEnd;
      }

      function startDrag(event) {
        var element = event.target.closest(".bar, .milestone");
        if (!element) { return; }
        var task = findTask(element.dataset.taskId);
        if (!task || task.type === "summary") {
          selectedId = task ? task.id : selectedId;
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        selectedId = task.id;
        dragState = {
          task: task,
          element: element,
          startX: event.clientX,
          originalStart: task.start,
          originalEnd: task.end,
          difference: 0
        };
        element.setPointerCapture(event.pointerId);
        element.classList.add("is-dragging");
      }

      function moveDrag(event) {
        if (!dragState) { return; }
        var delta = Math.round((event.clientX - dragState.startX) / DAY_WIDTH);
        if (delta === dragState.difference) { return; }
        var nextStart = addDays(parseDate(dragState.originalStart), delta);
        var nextEnd = addDays(parseDate(dragState.originalEnd), delta);
        if (!dateWithinTimeline(nextStart) || !dateWithinTimeline(nextEnd)) { return; }
        dragState.difference = delta;
        dragState.element.style.transform = dragState.element.classList.contains("milestone") ?
          "translateX(" + (delta * DAY_WIDTH) + "px) rotate(45deg)" :
          "translateX(" + (delta * DAY_WIDTH) + "px)";
      }

      function endDrag() {
        if (!dragState) { return; }
        var state = dragState;
        dragState = null;
        state.element.classList.remove("is-dragging");
        if (state.difference) {
          state.task.start = formatDate(addDays(parseDate(state.originalStart), state.difference));
          state.task.end = formatDate(addDays(parseDate(state.originalEnd), state.difference));
          saveTasks();
          showToast("已调整“" + state.task.name + "”的日期。");
        }
        render();
      }

      function showToast(message) {
        var toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("is-visible");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.remove("is-visible"); }, 2400);
      }

      function menuButton(label, callback, className) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "menu-item" + (className ? " " + className : "");
        button.textContent = label;
        button.addEventListener("click", function () {
          hideMenu();
          callback();
        });
        return button;
      }

      function menuDivider() {
        var divider = document.createElement("div");
        divider.className = "menu-separator";
        return divider;
      }

      function addMenuTitle(text) {
        var title = document.createElement("div");
        title.className = "menu-title";
        title.textContent = text;
        actionMenu.appendChild(title);
      }

      function showMainMenu(button) {
        actionMenu.replaceChildren();
        var selected = findTask(selectedId);
        addMenuTitle(selected ? tr("selected") + selected.name : tr("projectOperations"));
        actionMenu.appendChild(menuButton(tr("newTopTask"), function () { addTask(null, "task"); }));
        if (selected) {
          actionMenu.appendChild(menuButton(tr("newSiblingTask"), function () { addTask(selected.parent, "task", selected.id); }));
          actionMenu.appendChild(menuButton(tr("newMilestone"), function () { addTask(selected.parent, "milestone", selected.id); }));
          if (hasChildren(selected) || selected.type === "summary") {
            actionMenu.appendChild(menuButton(tr("newChildTask"), function () { addTask(selected.id, "task"); }));
          }
          actionMenu.appendChild(menuButton(tr("moveUpMenu"), function () { moveTask(selected, "up"); }));
          actionMenu.appendChild(menuButton(tr("moveDownMenu"), function () { moveTask(selected, "down"); }));
          if (selected.parent) {
            actionMenu.appendChild(menuButton(tr("outdent"), function () { outdentTask(selected); }));
          }
          actionMenu.appendChild(menuDivider());
          actionMenu.appendChild(menuButton(tr("deleteSelected"), function () { deleteSelected(selected); }, "danger"));
        }
        actionMenu.appendChild(menuDivider());
        actionMenu.appendChild(menuButton(tr("expandAll"), function () { collapsedIds.clear(); render(); }));
        actionMenu.appendChild(menuButton(tr("collapseAll"), function () {
          tasks.filter(function (task) { return hasChildren(task); }).forEach(function (task) { collapsedIds.add(task.id); });
          render();
        }));
        actionMenu.appendChild(menuDivider());
        actionMenu.appendChild(menuButton(tr("resetExample"), resetTasks));
        positionMenu(button);
      }

      function positionMenu(button) {
        var box = button.getBoundingClientRect();
        actionMenu.hidden = false;
        var left = Math.max(8, Math.min(window.innerWidth - 228, box.left));
        var top = Math.min(window.innerHeight - actionMenu.offsetHeight - 8, box.bottom + 5);
        actionMenu.style.left = left + "px";
        actionMenu.style.top = Math.max(8, top) + "px";
        menuOpen = true;
      }

      function hideMenu() {
        actionMenu.hidden = true;
        menuOpen = false;
      }

      function addTask(parent, type, insertAfter) {
        var suggestedDate = selectedId && findTask(selectedId) ? displayRange(findTask(selectedId)).end : "2026-07-13";
        var newTask = {
          id: "task-" + Date.now() + "-" + Math.random().toString(16).slice(2),
          name: type === "milestone" ? tr("newMilestoneName") : tr("newTaskName"),
          start: suggestedDate,
          end: suggestedDate,
          type: type === "milestone" ? "milestone" : "yellow",
          parent: parent
        };
        if (type !== "milestone") {
          newTask.end = formatDate(addDays(parseDate(suggestedDate), 4));
        }
        if (insertAfter) {
          var index = tasks.findIndex(function (task) { return task.id === insertAfter; });
          tasks.splice(index + 1, 0, newTask);
        } else {
          tasks.push(newTask);
        }
        selectedId = newTask.id;
        if (parent) { collapsedIds.delete(parent); }
        saveTasks();
        render();
        requestAnimationFrame(function () {
          var input = taskRowsElement.querySelector('[data-task-id="' + newTask.id + '"] .name-editor');
          if (input) {
            input.focus();
            input.select();
          }
        });
      }

      function outdentTask(task) {
        if (!task || !task.parent) {
          showToast("所选任务已经在顶层。");
          return;
        }
        var parent = findTask(task.parent);
        task.parent = parent ? parent.parent : null;
        saveTasks();
        render();
        showToast("已减少“" + task.name + "”的层级。");
      }

      function moveTask(task, direction) {
        if (!task) {
          showToast("请先选择一个任务。");
          return;
        }
        var neighbor = visibleMoveTarget(task, direction);
        if (!neighbor) {
          showToast(direction === "up" ? "该任务已经排在最前。" : "该任务已经排在最后。");
          return;
        }

        var movingIds = new Set([task.id].concat(descendantsOf(task.id).map(function (item) { return item.id; })));
        var movingBlock = tasks.filter(function (item) { return movingIds.has(item.id); });
        var remaining = tasks.filter(function (item) { return !movingIds.has(item.id); });
        var insertAt;

        if (direction === "up") {
          task.parent = neighbor.parent;
          insertAt = remaining.findIndex(function (item) { return item.id === neighbor.id; });
        } else {
          var neighborChildren = childrenOf(neighbor.id).filter(function (item) { return !movingIds.has(item.id); });
          if (neighborChildren.length && !collapsedIds.has(neighbor.id)) {
            task.parent = neighbor.id;
            collapsedIds.delete(neighbor.id);
            insertAt = remaining.findIndex(function (item) { return item.id === neighborChildren[0].id; });
          } else {
            task.parent = neighbor.parent;
            insertAt = remaining.findIndex(function (item) { return item.id === neighbor.id; }) + 1;
          }
        }

        if (insertAt < 0) {
          showToast("无法移动该任务，请重试。");
          return;
        }
        tasks = remaining.slice(0, insertAt).concat(movingBlock, remaining.slice(insertAt));
        saveTasks();
        render();
        showToast("已" + (direction === "up" ? "上移" : "下移") + "一行：“" + task.name + "”。");
      }

      function deleteSelected(task) {
        var nested = descendantsOf(task.id);
        var message = nested.length ?
          "删除“" + task.name + "”及其 " + nested.length + " 个子任务吗？" :
          "删除“" + task.name + "”吗？";
        if (!window.confirm(message)) { return; }
        var removal = new Set([task.id].concat(nested.map(function (item) { return item.id; })));
        tasks = tasks.filter(function (item) { return !removal.has(item.id); });
        selectedId = null;
        saveTasks();
        render();
        showToast("任务已删除。");
      }

      function saveCurrentProject() {
        setProjectName(projectNameInput.value);
        persistTasks();
        showToast(tr("projectSaved"));
      }

      function createNewGantt() {
        if (!window.confirm(tr("newGanttConfirm"))) { return; }
        tasks = [];
        selectedId = null;
        collapsedIds.clear();
        setProjectName("");
        finalPresentationDate = formatDate(todayUtcDate());
        saveFinalPresentationDate();
        timelineStart = addDays(todayUtcDate(), -7);
        timelineEnd = addDays(todayUtcDate(), 21);
        undoStack = [];
        redoStack = [];
        lastSavedSnapshot = JSON.stringify(tasks);
        persistTasks();
        updateHistoryButtons();
        updateFinalPresentationPanel();
        render();
        showToast(tr("newGanttCreated"));
      }

      function exportTasks() {
        var projectFile = {
          version: 2,
          projectName: projectName,
          finalPresentationDate: finalPresentationDate,
          tasks: tasks
        };
        var blob = new Blob([JSON.stringify(projectFile, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "gantt-project-" + formatDate(new Date()) + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast(tr("fileSaved"));
      }

      function openProjectFile() {
        importInput.click();
      }

      function resetTasks() {
        if (!window.confirm("恢复为与截图一致的示例数据？当前本地修改会被替换。")) { return; }
        tasks = copyDefaults();
        selectedId = null;
        collapsedIds.clear();
        saveTasks();
        render();
        showToast("已恢复截图示例数据。");
      }

      function validateImport(data) {
        return Array.isArray(data) && data.every(function (task) {
          return task && typeof task.id === "string" && typeof task.name === "string" &&
            typeof task.start === "string" && typeof task.end === "string" &&
            typeof task.type === "string" && ("parent" in task);
        });
      }

      function importTasks(event) {
        var file = event.target.files[0];
        if (!file) { return; }
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var importedFile = JSON.parse(reader.result);
            var incoming = Array.isArray(importedFile) ? importedFile : importedFile && importedFile.tasks;
            if (!validateImport(incoming)) { throw new Error("格式不正确"); }
            tasks = incoming;
            if (!Array.isArray(importedFile) && typeof importedFile.projectName === "string") {
              setProjectName(importedFile.projectName);
            }
            if (!Array.isArray(importedFile) && isValidDateValue(importedFile.finalPresentationDate)) {
              setFinalPresentationDate(importedFile.finalPresentationDate);
            }
            selectedId = null;
            collapsedIds.clear();
            saveTasks();
            render();
            showToast("已导入 " + tasks.length + " 个任务。");
          } catch (error) {
            showToast("导入失败：请选择由本应用导出的 JSON 文件。");
          }
          importInput.value = "";
        };
        reader.readAsText(file, "utf-8");
      }

      document.getElementById("mainMenuButton").addEventListener("click", function (event) {
        event.stopPropagation();
        if (menuOpen) { hideMenu(); }
        else { showMainMenu(event.currentTarget); }
      });

      document.getElementById("moveUpButton").addEventListener("click", function () {
        moveTask(findTask(selectedId), "up");
      });
      document.getElementById("moveDownButton").addEventListener("click", function () {
        moveTask(findTask(selectedId), "down");
      });
      document.getElementById("addTaskButton").addEventListener("click", function () {
        var selected = findTask(selectedId);
        addTask(selected ? selected.parent : null, "task", selected ? selected.id : null);
      });
      document.getElementById("outdentTaskButton").addEventListener("click", function () {
        outdentTask(findTask(selectedId));
      });
      document.getElementById("deleteTaskButton").addEventListener("click", function () {
        var selected = findTask(selectedId);
        if (selected) { deleteSelected(selected); }
      });
      document.getElementById("undoButton").addEventListener("click", undoChanges);
      document.getElementById("redoButton").addEventListener("click", redoChanges);
      document.getElementById("saveButton").addEventListener("click", saveCurrentProject);
      document.getElementById("newGanttButton").addEventListener("click", createNewGantt);
      document.getElementById("saveProjectButton").addEventListener("click", exportTasks);
      document.getElementById("loadProjectButton").addEventListener("click", openProjectFile);
      languageSelect.addEventListener("change", function () { setLanguage(languageSelect.value); });
      projectNameInput.addEventListener("change", function () { setProjectName(projectNameInput.value); });
      projectNameInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          setProjectName(projectNameInput.value);
          projectNameInput.blur();
        }
      });
      finalPresentationInput.addEventListener("click", function (event) {
        event.stopPropagation();
        openDatePicker(finalPresentationInput, finalPresentationDate, setFinalPresentationDate);
      });
      finalPresentationInput.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" && event.key !== " ") { return; }
        event.preventDefault();
        openDatePicker(finalPresentationInput, finalPresentationDate, setFinalPresentationDate);
      });
      document.getElementById("datePickerPrevious").addEventListener("click", function () { changeDatePickerMonth(-1); });
      document.getElementById("datePickerNext").addEventListener("click", function () { changeDatePickerMonth(1); });

      document.querySelectorAll("[data-quick]").forEach(function (button) {
        button.addEventListener("click", function () {
          DAY_WIDTH = button.dataset.quick === "zoomIn" ? Math.min(18, DAY_WIDTH + 1.2) : Math.max(5.5, DAY_WIDTH - 1.2);
          render();
          showToast(button.dataset.quick === "zoomIn" ? "已放大时间轴。" : "已缩小时间轴。");
        });
      });

      document.addEventListener("click", function (event) {
        if (menuOpen && !actionMenu.contains(event.target) && !event.target.closest(".header-menu")) {
          hideMenu();
        }
        if (datePickerState && !datePicker.contains(event.target) &&
          !event.target.closest(".date-editor, .final-date-input")) {
          hideDatePicker();
        }
      });

      document.addEventListener("keydown", function (event) {
        var editingField = event.target && /^(INPUT|TEXTAREA|SELECT)$/.test(event.target.tagName);
        if (!editingField && (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          if (event.shiftKey) { redoChanges(); }
          else { undoChanges(); }
          return;
        }
        if (event.key === "Escape" && menuOpen) { hideMenu(); }
        if (event.key === "Escape" && datePickerState) { hideDatePicker(); }
      });

      timelinePane.addEventListener("scroll", function () {
        timelineHeaderInner.style.transform = "translateX(" + (-timelinePane.scrollLeft) + "px)";
        if (!scrollLock) {
          scrollLock = true;
          taskPane.scrollTop = timelinePane.scrollTop;
          scrollLock = false;
        }
      });

      taskPane.addEventListener("scroll", function () {
        if (!scrollLock) {
          scrollLock = true;
          timelinePane.scrollTop = taskPane.scrollTop;
          scrollLock = false;
        }
      });

      timelineCanvas.addEventListener("pointerdown", startDrag);
      paneResizer.addEventListener("pointerdown", startTableResize);
      paneResizer.addEventListener("keydown", function (event) {
        if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") { return; }
        event.preventDefault();
        setTableWidth(tableWidth + (event.key === "ArrowLeft" ? -1 : 1) * (event.shiftKey ? 50 : 20), true);
      });
      document.addEventListener("pointermove", moveDrag);
      document.addEventListener("pointermove", moveTableResize);
      document.addEventListener("pointerup", endDrag);
      document.addEventListener("pointerup", endTableResize);
      document.addEventListener("pointercancel", endDrag);
      document.addEventListener("pointercancel", endTableResize);
      importInput.addEventListener("change", importTasks);
      window.addEventListener("resize", function () {
        setTableWidth(tableWidth, false);
        hideDatePicker();
        render();
      });

      setTableWidth(tableWidth, false);
      applyTranslations();
      lastProgressDate = formatDate(todayUtcDate());
      window.setInterval(refreshProgressForNewDay, 60000);
      render();
      updateHistoryButtons();
    }());
  </script>
</body>
</html>
